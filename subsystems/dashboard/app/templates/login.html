<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign in — RustDesk Fleet</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="login-shell">
  <div class="login-card">
    <div class="login-logo">
      <div class="brand-icon">R</div>
      <div>
        <span class="brand-name">RustDesk Fleet</span>
        <span class="brand-sub">Management Console</span>
      </div>
    </div>
    <h2>Welcome back</h2>
    <p>Sign in to manage your fleet.</p>
    {% if error %}<div class="flash error">{{ error }}</div>{% endif %}
    <form method="post" action="/login">
      <div class="login-field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" autofocus required placeholder="Enter password">
      </div>
      <button type="submit" class="btn btn-primary">Sign in</button>
    </form>
  </div>
</div>
</body>
</html>
