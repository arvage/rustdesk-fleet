<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign in — RustDesk Fleet</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="login-shell">
  <div class="login-card">
    <div class="login-logo">
      <div class="brand-icon">R</div>
      <div>
        <span class="brand-name">RustDesk Fleet</span>
        <span class="brand-sub">Management Console</span>
      </div>
    </div>
    <h2>Welcome back</h2>
    <p>Sign in to manage your fleet.</p>
    {% if just_setup %}
    <div class="flash success" style="margin-bottom:16px">Account created — sign in below.</div>
    {% endif %}
    {% if error %}<div class="flash error" style="margin-bottom:16px">{{ error }}</div>{% endif %}
    <form method="post" action="/login">
      <div class="login-field">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" autofocus required
               placeholder="you@example.com" autocomplete="email">
      </div>
      <div class="login-field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required
               placeholder="Your password" autocomplete="current-password">
      </div>
      <button type="submit" class="btn btn-primary">Sign in</button>
    </form>
  </div>
</div>
</body>
</html>
