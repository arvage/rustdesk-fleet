<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}RustDesk Fleet{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="shell">

  <!-- Sidebar -->
  <aside class="sidebar">
    <a class="sidebar-brand" href="/">
      <div class="brand-icon">R</div>
      <div>
        <span class="brand-name">RustDesk Fleet</span>
        <span class="brand-sub">Management Console</span>
      </div>
    </a>
    <nav class="sidebar-nav">
      <div class="nav-section">
        <div class="nav-label">Overview</div>
        <a href="/" class="nav-item {% if request.url.path == '/' %}active{% endif %}">
          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
          Server Status
        </a>
        <a href="/groups" class="nav-item {% if '/groups' in request.url.path %}active{% endif %}">
          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          Client Groups
        </a>
        <a href="/audit" class="nav-item {% if request.url.path == '/audit' %}active{% endif %}">
          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
          Audit Log
        </a>
      </div>
    </nav>
    <div class="sidebar-footer">
      <a href="/logout" class="nav-item" style="color:#EF4444">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Sign out
      </a>
    </div>
  </aside>

  <!-- Main -->
  <div class="main">
    <header class="topbar">
      <span class="topbar-title">{% block page_title %}{% endblock %}</span>
      <div class="topbar-right">{% block topbar_actions %}{% endblock %}</div>
    </header>
    <div class="content">
      {% set flash = get_flash(request) %}
      {% if flash %}<div class="flash {{ flash.type }}">{{ flash.msg }}</div>{% endif %}
      {% block content %}{% endblock %}
    </div>
  </div>

</div>
</body>
</html>
