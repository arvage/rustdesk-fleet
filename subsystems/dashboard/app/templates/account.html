{% extends "base.html" %}
{% block title %}My Account — RustDesk Fleet{% endblock %}
{% block page_title %}My Account{% endblock %}

{% block content %}
<div style="max-width:440px">
  <div class="section">
    <div class="section-head"><h2>Change Password</h2></div>
    <div class="card">
      <div class="card-body">
        {% if success %}
        <div class="flash success" style="margin-bottom:16px">Password updated.</div>
        {% endif %}
        {% if error %}
        <div class="flash error" style="margin-bottom:16px">{{ error }}</div>
        {% endif %}
        <form method="post" action="/account/password">
          <div class="field" style="margin-bottom:12px">
            <label for="current_password">Current password</label>
            <input type="password" id="current_password" name="current_password" required
                   autocomplete="current-password" style="width:100%">
          </div>
          <div class="field" style="margin-bottom:12px">
            <label for="new_password">New password <span class="text-muted" style="font-weight:400">(10+ chars)</span></label>
            <input type="password" id="new_password" name="new_password" required
                   minlength="10" autocomplete="new-password" style="width:100%">
          </div>
          <div class="field" style="margin-bottom:20px">
            <label for="new_password2">Confirm new password</label>
            <input type="password" id="new_password2" name="new_password2" required
                   minlength="10" autocomplete="new-password" style="width:100%">
          </div>
          <button type="submit" class="btn btn-primary">Update password</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
