<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Rounded blue background -->
  <rect width="32" height="32" rx="7" fill="#2563EB"/>
  <!-- Monitor frame -->
  <rect x="4" y="5" width="24" height="17" rx="2.5" fill="none" stroke="white" stroke-width="2"/>
  <!-- Network: top node (green = online) -->
  <circle cx="16" cy="9.5" r="2.2" fill="#34D399"/>
  <!-- Network: bottom-left and bottom-right nodes -->
  <circle cx="10" cy="15.5" r="1.7" fill="white"/>
  <circle cx="22" cy="15.5" r="1.7" fill="white"/>
  <!-- Connection lines -->
  <line x1="16" y1="9.5" x2="10" y2="15.5" stroke="white" stroke-width="1.3" opacity="0.85"/>
  <line x1="16" y1="9.5" x2="22" y2="15.5" stroke="white" stroke-width="1.3" opacity="0.85"/>
  <!-- Monitor stand -->
  <line x1="13" y1="22" x2="12" y2="26" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <line x1="19" y1="22" x2="20" y2="26" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <line x1="10" y1="26" x2="22" y2="26" stroke="white" stroke-width="2" stroke-linecap="round"/>
</svg>
